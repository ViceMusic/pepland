name: pepland-supervised
channels:
  - pytorch
  - nvidia
  - dglteam/label/cu118
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - pip

  # Core training stack
  - pytorch=2.2.0
  - pytorch-cuda=11.8
  - torchdata=0.7.1
  - dgl=2.0.0.cu118

  # SMILES -> RDKit molecule -> DGL heterograph
  - rdkit=2023.03.1

  # Data and metrics used by train_supervised.py
  - numpy=1.24.3
  - pandas=1.4.3
  - scikit-learn=1.1.1
  - scipy=1.7.1

  # Imported by tokenizer/pep2fragments.py at module import time
  - ipython=8.4.0
